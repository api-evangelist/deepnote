meters:
- name: editor_seats
  description: Editor seats billed per editor per month (Team plan).
  unit: seats
  aggregation: sum
  dimensions:
  - workspace
  - plan
- name: ai_credits
  description: AI usage drawn against bundled monthly AI credits, then metered.
  unit: credits
  aggregation: sum
  dimensions:
  - workspace
  - model
- name: cpu_compute
  description: CPU machine time drawn against bundled monthly CPU credits, then metered.
  unit: machine_hours
  aggregation: sum
  dimensions:
  - workspace
  - project
- name: gpu_compute
  description: GPU machine time drawn against bundled monthly GPU credits, then metered.
  unit: machine_hours
  aggregation: sum
  dimensions:
  - workspace
  - project
- name: notebook_runs
  description: Notebook executions, including API-triggered runs, consuming project machine time.
  unit: runs
  aggregation: sum
  dimensions:
  - workspace
  - project
  - notebook
principles:
- name: Visibility
  description: Track editor seat counts and per-workspace AI/CPU/GPU consumption against bundled credits.
- name: Allocation
  description: Map projects and API keys to teams/workloads; attribute compute and runs to cost centers.
- name: Optimization
  description: Right-size machines, schedule heavy runs off-peak, lean on bundled credits before metered usage, and remove idle editor seats.
- name: Accountability
  description: Assign owners per workspace/project; review seat and compute spend monthly against budget.
maintainers:

description: >-
  FinOps view of Deepnote spend. Deepnote bills primarily per editor seat
  (Team $39/editor/month, $31.20 annual; Free up to 3 editors; Enterprise
  custom). The Team plan bundles monthly AI ($39), CPU ($280), and GPU ($50)
  credits; consumption beyond bundled credits and larger machines is metered.
  The Public API consumes the same compute (project machines) when running
  notebooks, so API-driven runs draw on the workspace's compute budget.
notes: >-
  Per-editor prices and bundled credit amounts are subject to change; verify
  against the Deepnote pricing page during reconciliation. Metered compute and
  AI rates beyond bundled credits are workspace-specific.
sources:
- https://deepnote.com/pricing
- https://deepnote.com/docs
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/

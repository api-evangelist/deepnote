  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Deepnote
serviceCategory: Analytics and Data Science
billingModel:
  pricingCategory: Seat-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Deepnote
  ServiceCategory: Analytics and Data Science
  ProviderName: Deepnote
  PublisherName: Deepnote
  InvoiceIssuerName: Deepnote
